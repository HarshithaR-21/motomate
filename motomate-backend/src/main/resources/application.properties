spring.config.import=optional:file:.env[.properties]
spring.application.name=motomate
spring.mongodb.uri=${DB_URL}

# Debug logging for web requests
logging.level.web=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

Email configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${ADMIN_EMAIL}
spring.mail.password=${ADMIN_EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Email sender address used as the From header
app.mail.from=${ADMIN_EMAIL}

# Admin email settings
app.admin.email=${ADMIN_EMAIL}
app.admin.name=Motomate Admin

app.upload.dir=uploads/service-center-docs

spring.jackson.deserialization.fail-on-null-for-primitives=false